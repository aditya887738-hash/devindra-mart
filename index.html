<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Devindra Mart Customer</title><link rel="manifest" href="/manifest.json"><link rel="stylesheet" href="/style.css"></head><body><div class="app" id="app"></div><script src="/firebase-config.js"></script><script src="/shared/core.js"></script><script>
function render(){let cats=[...new Set(DM.products.map(p=>p.cat))];document.getElementById('app').innerHTML=header('Devindra Mart','Customer App • Wholesale / Retail / Both')+`<div class="hero"><img src="${DM.banner}"></div>
<div class="card"><div class="row"><input class="input" style="flex:1" placeholder="${t('search')} — atta, aata, tel, chocolate"><button class="btn">🎙️ ${t('voice')}</button><button class="btn ghost">🔔</button></div><div class="row" style="margin-top:10px">${cats.map(c=>`<button class="chip" onclick="shopFlow('${c}')">${c}</button>`).join('')}<button class="chip">Tel/Oil</button><button class="chip">Chawal/Rice</button><button class="chip">More</button></div></div>
<div class="section-title"><h2>Daily Products</h2><div><button class="btn ghost">Grid</button><button class="btn ghost">List</button></div></div><div class="grid">${DM.products.map(p=>`<div class="card"><img class="product-img" src="${p.img}" onerror="this.src='/assets/app-icon.jpg'"><div class="row"><span class="badge">${p.scheme}</span><span class="status">Stock ${p.stock}</span></div><h3>${p.name}</h3><div class="sub">${p.brand} • ${p.variant} • ${p.unit}</div><div class="price">₹${p.loose}</div><div class="small">Carton/Bulk: ₹${p.carton}</div><button class="btn green" onclick="addCart('${p.id}')">${t('add')}</button></div>`).join('')}</div>
<div class="section-title"><h2>Cart / Order</h2><button class="btn ghost">${t('summary')}</button></div><div class="card"><b>${DM.cart.length} items in cart</b><div class="row" style="margin-top:10px"><button class="btn green" onclick="whatsappOrder()">${t('whatsapp')}</button><button class="btn" onclick="let o=makeOrder('app'); if(o) toast('Order created: '+o.id)">${t('order')}</button><button class="btn ghost">${t('parcha')}</button><button class="btn ghost">🎤 Voice Upload</button></div></div>
<div class="card"><h3>${t('khata')}</h3><p>Total Due: ₹0 • Overdue: none • Pay Now via UPI</p></div>${nav('customer')}`}
function shopFlow(cat){let list=DM.stores.filter(s=>s.cat===cat);if(list.length<=1){toast((list[0]?.name||'Shop')+' direct open')}else{alert('Nearby shops:\n'+list.sort((a,b)=>a.km-b.km).map(s=>s.name+' — '+s.km+' km').join('\n'))}}
render(); if('serviceWorker' in navigator)navigator.serviceWorker.register('/service-worker.js');</script></body></html>

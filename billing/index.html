<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Devindra Mart Billing</title><link rel="manifest" href="/manifest.json"><link rel="stylesheet" href="/style.css"></head><body><div class="app" id="app"></div><script src="/firebase-config.js"></script><script src="/shared/core.js"></script><script>
const sample=DM.orders[0]||{id:'DM845621',items:DM.products.slice(0,2).map((p,i)=>({...p,qty:i+1})),total:935,delivery:20,payment:'COD',status:'Packing',created:new Date().toLocaleString(),riderStatus:'Pickup Pending'};
function receipt(o=sample){return `<div class="receipt"><img class="rlogo" src="/assets/logo-premium.png"><center><b>DEVINDRA MART</b><br><small>Bharose ke saath vyapar</small></center><div class="dash"></div>Order: ${o.id}<br>Date: ${o.created}<br>Payment: ${o.payment}<div class="dash"></div><b>ITEMS</b><br>${o.items.map(i=>`${i.name.slice(0,22)}\n ${i.qty} x ₹${i.loose} = ₹${i.qty*i.loose}`).join('<br>')}<div class="dash"></div>Subtotal: ₹${o.total}<br>Delivery: ₹${o.delivery}<br><b>TOTAL: ₹${o.total+o.delivery}</b><div class="dash"></div><center><b>PICKUP VERIFY QR</b><div class="qr"></div><small>QR visible only on Billing/Rider pickup verification copy</small></center><div class="dash"></div><center>Thank you</center></div>`}
document.getElementById('app').innerHTML=header('Merchant / Billing App','Billing • Packing • Dispatch')+`<div class="grid" style="margin-top:14px"><div class="card"><h3>New Live Orders</h3><div class="price">${DM.orders.length||1}</div><button class="btn green">Auto Print Queue</button></div><div class="card"><h3>Rider Live Visual Status</h3><p><span class="status pending">Pickup Pending</span> <span class="status">QR Scanned</span> <span class="status">Picked</span> <span class="status">Delivered</span></p><p class="small">Customer receipt me internal rider status nahi dikhega.</p></div><div class="card"><h3>Devindra Mart Wholesale</h3><p>Manual rider assign allowed.</p><button class="btn">Assign Rider</button></div><div class="card"><h3>Other Stores</h3><p>Auto assign possible by nearest/online/least busy rider.</p></div></div>
<div class="section-title"><h2>Order / Print Preview</h2><button class="btn" onclick="window.print()">Print</button></div>${receipt(sample)}
<div class="section-title"><h2>Tools</h2></div><div class="grid"><div class="card"><h3>Payment Verification</h3><button class="btn ghost">COD</button> <button class="btn ghost">UPI Pending/Paid</button></div><div class="card"><h3>WhatsApp Invoice</h3><button class="btn green">Send Invoice</button></div><div class="card"><h3>Packing Queue</h3><button class="btn">Mark Packed</button></div></div>${nav('billing')}`;
if('serviceWorker' in navigator)navigator.serviceWorker.register('/service-worker.js');</script></body></html>
